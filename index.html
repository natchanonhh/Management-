<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบแอดมิน - จัดการสิทธิ์แบบรวมศูนย์</title>
  <style>
    body { font-family: sans-serif; background: #e9ecef; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
    .admin-box { background: white; padding: 25px; border-radius: 10px; width: 100%; max-width: 800px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 25px; box-sizing: border-box; }
    h2 { margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
    label { font-weight: bold; margin-top: 15px; display: block; font-size: 14px; color: #333; }
    input, select, textarea, button { width: 100%; padding: 12px; margin-top: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; font-size: 14px; }
    textarea { height: 120px; resize: vertical; }
    button { color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.2s; }
    button:hover { opacity: 0.85; }
    
    .btn-blue { background: #007bff; }
    .btn-green { background: #28a745; }
    .btn-yellow { background: #ffc107; color: #000; }
    .btn-red { background: #dc3545; }
    .btn-gray { background: #6c757d; display: none; }
    
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 15px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: middle; }
    th { background-color: #f8f9fa; text-align: center; }
    .action-btns { display: flex; gap: 5px; justify-content: center; }
    .action-btns button { width: auto; padding: 6px 10px; margin: 0; font-size: 12px; }
  </style>
</head>
<body>

  <div class="admin-box">
    <h2 id="formTitle">⚙️ เพิ่มงานใหม่เข้าสู่ระบบ</h2>
    <input type="hidden" id="editJobId"> <label>1. ชื่องาน / ชื่อบทเรียน:</label>
    <input type="text" id="jobTitle" placeholder="เช่น: เอกสารประกอบการเรียน บทที่ 1" required>
    
    <label>2. ประเภทของไฟล์:</label>
    <select id="fileType">
      <option value="youtube">วิดีโอ (ลิงก์ YouTube)</option>
      <option value="image">รูปภาพ (ลิงก์ภาพ)</option>
      <option value="pdf">ไฟล์ PDF / Google Drive (ลิงก์เอกสาร)</option>
    </select>

    <label>3. วางลิงก์ไฟล์ (URL):</label>
    <input type="text" id="fileUrl" placeholder="วางลิงก์ไฟล์ที่นี่..." required>

    <label>4. รายชื่อผู้มีสิทธิ์เข้าชม (1 งานใส่ได้ไม่จำกัด):</label>
    <textarea id="allowedUsers" placeholder="ใส่รหัสหรือชื่อ คั่นด้วยลูกน้ำ (,) หรือขึ้นบรรทัดใหม่&#10;เช่น: 6810210178, 6810210220&#10;(ก๊อปปี้จาก Excel มาวางได้เลย)"></textarea>

    <div style="display: flex; gap: 10px;">
      <button class="btn-blue" id="btnSave" onclick="saveJob()">➕ บันทึกงาน</button>
      <button class="btn-gray" id="btnCancel" onclick="cancelEdit()">❌ ยกเลิกการแก้ไข</button>
    </div>
    <p id="status" style="text-align: center; font-weight: bold; margin-bottom: 0;"></p>
  </div>

  <div class="admin-box">
    <h2>📋 จัดการงานทั้งหมด</h2>
    <div id="jobsTable"></div>
  </div>

  <div class="admin-box">
    <h2>📥 จัดการคำขอดาวน์โหลดงาน</h2>
    <div id="requestsTable"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, addDoc, getDoc, deleteDoc, collection, getDocs, serverTimestamp, updateDoc, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBLyMpowfyQK_1UnredPFmXdBdtQZKpY-c",
      authDomain: "datapdf-d14d0.firebaseapp.com",
      databaseURL: "https://datapdf-d14d0-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "datapdf-d14d0",
      storageBucket: "datapdf-d14d0.firebasestorage.app",
      messagingSenderId: "1034739093928",
      appId: "1:1034739093928:web:cd56cc0e208d7d00f24d9d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function cleanUrl(type, url) {
      if (type === "youtube" && url.includes("watch?v=")) return `https://www.youtube.com/embed/${url.split("v=")[1].split("&")[0]}`;
      if (type === "youtube" && url.includes("youtu.be/")) return `https://www.youtube.com/embed/${url.split("youtu.be/")[1].split("?")[0]}`;
      if (type === "pdf" && url.includes("drive.google.com") && url.includes("/view")) return url.split("/view")[0] + "/preview";
      return url;
    }

    window.saveJob = async function() {
      const editId = document.getElementById("editJobId").value;
      const title = document.getElementById("jobTitle").value.trim();
      const type = document.getElementById("fileType").value;
      let url = document.getElementById("fileUrl").value.trim();
      const rawUsers = document.getElementById("allowedUsers").value;
      const statusText = document.getElementById("status");

      if (!title || !url) {
        statusText.innerText = "❌ กรุณากรอกชื่องานและลิงก์ให้ครบ";
        statusText.style.color = "red";
        return;
      }

      const userList = rawUsers.split(/[\n,]+/).map(id => id.trim()).filter(id => id !== "");
      url = cleanUrl(type, url);

      statusText.innerText = "กำลังบันทึกข้อมูล...";
      statusText.style.color = "blue";

      try {
        const jobData = {
          title: title,
          type: type,
          url: url,
          allowedUsers: userList,
          updatedAt: serverTimestamp()
        };

        if (editId) {
          await setDoc(doc(db, "jobs", editId), jobData, { merge: true });
          statusText.innerText = "✅ อัปเดตงานเรียบร้อย!";
        } else {
          jobData.createdAt = serverTimestamp();
          await addDoc(collection(db, "jobs"), jobData);
          statusText.innerText = "✅ สร้างงานใหม่เรียบร้อย!";
        }
        
        statusText.style.color = "green";
        cancelEdit(); 
        loadJobs();   
      } catch (error) {
        statusText.innerText = "❌ เกิดข้อผิดพลาด (อย่าลืมตั้งค่า Rules เป็น true นะครับ)";
        statusText.style.color = "red";
      }
    }

    window.loadJobs = async function() {
      const tableDiv = document.getElementById("jobsTable");
      tableDiv.innerHTML = "<p style='text-align:center;'>กำลังโหลด...</p>";

      try {
        const querySnapshot = await getDocs(collection(db, "jobs"));
        if (querySnapshot.empty) {
          tableDiv.innerHTML = "<p style='text-align:center; color:gray;'>ยังไม่มีงานในระบบ</p>";
          return;
        }

        let html = `<table>
                      <tr>
                        <th width="30%">ชื่องาน</th>
                        <th width="15%">ประเภท</th>
                        <th width="30%">จำนวนผู้มีสิทธิ์ดู</th>
                        <th width="25%">จัดการ</th>
                      </tr>`;
        
        querySnapshot.forEach((docSnap) => {
          const id = docSnap.id;
          const data = docSnap.data();
          const userCount = data.allowedUsers ? data.allowedUsers.length : 0;
          
          const safeData = encodeURIComponent(JSON.stringify({id: id, ...data}));

          html += `<tr>
                    <td><b>${data.title}</b></td>
                    <td style="text-align:center;">${data.type}</td>
                    <td style="text-align:center; color:green; font-weight:bold;">${userCount} คน</td>
                    <td>
                      <div class="action-btns">
                        <button class="btn-yellow" onclick="editJob('${safeData}')">✏️ แก้ไข</button>
                        <button class="btn-red" onclick="deleteJob('${id}')">🗑️ ลบ</button>
                      </div>
                    </td>
                   </tr>`;
        });
        html += "</table>";
        tableDiv.innerHTML = html;
      } catch (error) {
        tableDiv.innerHTML = "<p style='color:red; text-align:center;'>โหลดข้อมูลไม่สำเร็จ</p>";
      }
    }

    window.editJob = function(encodedData) {
      const data = JSON.parse(decodeURIComponent(encodedData));
      
      document.getElementById("formTitle").innerText = "✏️ แก้ไขข้อมูลงาน / จัดการสิทธิ์";
      document.getElementById("editJobId").value = data.id;
      document.getElementById("jobTitle").value = data.title;
      document.getElementById("fileType").value = data.type;
      document.getElementById("fileUrl").value = data.url;
      document.getElementById("allowedUsers").value = (data.allowedUsers || []).join(",\n");

      document.getElementById("btnSave").innerText = "💾 บันทึกการแก้ไข";
      document.getElementById("btnSave").classList.replace("btn-blue", "btn-yellow");
      document.getElementById("btnCancel").style.display = "block";
      document.getElementById("status").innerText = "";
      
      window.scrollTo(0, 0);
    }

    window.cancelEdit = function() {
      document.getElementById("formTitle").innerText = "⚙️ เพิ่มงานใหม่เข้าสู่ระบบ";
      document.getElementById("editJobId").value = "";
      document.getElementById("jobTitle").value = "";
      document.getElementById("fileUrl").value = "";
      document.getElementById("allowedUsers").value = "";
      
      document.getElementById("btnSave").innerText = "➕ บันทึกงาน";
      document.getElementById("btnSave").classList.replace("btn-yellow", "btn-blue");
      document.getElementById("btnCancel").style.display = "none";
    }

    window.deleteJob = async function(id) {
      if (!confirm("⚠️ ยืนยันการลบงานนี้? (นักศึกษาทุกคนจะถูกตัดสิทธิ์จากงานนี้ทันที)")) return;
      try {
        await deleteDoc(doc(db, "jobs", id));
        loadJobs();
      } catch (e) { alert("ลบไม่สำเร็จ"); }
    }

    window.loadRequests = async function() {
      const tableDiv = document.getElementById("requestsTable");
      tableDiv.innerHTML = "<p style='text-align:center;'>กำลังโหลดคำขอ...</p>";

      try {
        const querySnapshot = await getDocs(collection(db, "download_requests"));
        if (querySnapshot.empty) {
          tableDiv.innerHTML = "<p style='text-align:center; color:gray;'>ไม่มีคำขอดาวน์โหลดในระบบ</p>";
          return;
        }

        let html = `<table>
                      <tr>
                        <th width="20%">รหัสผู้ชม</th>
                        <th width="40%">ชื่องาน</th>
                        <th width="20%">สถานะ</th>
                        <th width="20%">จัดการ</th>
                      </tr>`;
        
        querySnapshot.forEach((docSnap) => {
          const id = docSnap.id;
          const data = docSnap.data();
          
          let badge = "";
          if (data.status === "pending") {
            badge = `<span style="color:#856404; font-weight:bold;">⏳ รอตรวจสอบ</span>`;
          } else if (data.status === "approved") {
            badge = `<span style="color:#28a745; font-weight:bold;">✅ ยินยอมแล้ว</span>`;
            if (data.expiresAt) {
              const exp = data.expiresAt.toDate();
              badge += `<br><small style="color:gray;">หมดอายุ: ${exp.toLocaleString('th-TH')}</small>`;
            } else {
              badge += `<br><small style="color:gray;">ไม่จำกัดเวลา</small>`;
            }
          } else if (data.status === "rejected") {
            badge = `<span style="color:#dc3545; font-weight:bold;">❌ ไม่ยินยอม</span>`;
          }

          html += `<tr>
                    <td style="text-align:center;"><b>${data.studentId}</b></td>
                    <td>${data.jobTitle || '-'}</td>
                    <td style="text-align:center;">${badge}</td>
                    <td>
                      <div class="action-btns">
                        ${data.status !== 'approved' ? `<button class="btn-green" onclick="updateRequestStatus('${id}', 'approved')">ยินยอม</button>` : ''}
                        ${data.status !== 'rejected' ? `<button class="btn-red" onclick="updateRequestStatus('${id}', 'rejected')">ไม่ยินยอม</button>` : ''}
                      </div>
                    </td>
                   </tr>`;
        });
        html += "</table>";
        tableDiv.innerHTML = html;
      } catch (error) {
        tableDiv.innerHTML = "<p style='color:red; text-align:center;'>โหลดคำขอไม่สำเร็จ</p>";
      }
    }

    // ฟังก์ชันอัปเดตสถานะและตั้งเวลาหมดอายุ
    window.updateRequestStatus = async function(reqId, newStatus) {
      try {
        let updateData = {
          status: newStatus,
          updatedAt: serverTimestamp()
        };

        if (newStatus === 'approved') {
          // ถามแอดมินว่าให้ดาวน์โหลดได้กี่ชั่วโมง
          const hours = prompt("กำหนดเวลาให้ดาวน์โหลดได้กี่ชั่วโมง?\\n(ระบุตัวเลข เช่น 24 = 1 วัน, 72 = 3 วัน, 0 = ไม่จำกัดเวลา)", "72");
          
          if (hours === null) return; // กรณีกดยกเลิก
          
          const duration = parseInt(hours);
          if (isNaN(duration) || duration < 0) {
            alert("กรุณากรอกตัวเลขที่ถูกต้อง");
            return;
          }
          
          if (duration > 0) {
            const expireDate = new Date();
            expireDate.setHours(expireDate.getHours() + duration);
            updateData.expiresAt = expireDate;
          } else {
            updateData.expiresAt = null; // กรณีอนุญาตถาวร (ไม่จำกัดเวลา)
          }
        }

        await updateDoc(doc(db, "download_requests", reqId), updateData);
        loadRequests();
      } catch (e) {
        alert("เกิดข้อผิดพลาดในการอัปเดตสถานะ");
      }
    }

    loadJobs();
    loadRequests();
  </script>
</body>
</html>
