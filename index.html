<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบผู้ดูแล - จัดการสิทธิ์แบบรวมศูนย์</title>
  <style>
    body { font-family: sans-serif; background: #e9ecef; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh;}
    
    /* สไตล์สำหรับกล่อง Login หน้าแอดมิน */
    #adminLoginWrapper {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #e9ecef; display: flex; justify-content: center; align-items: center;
      z-index: 9999;
    }
    .login-card {
      background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%; max-width: 400px; text-align: center; box-sizing: border-box;
    }
    .login-card h2 { margin-top: 0; color: #333; justify-content: center;}
    
    /* สไตล์เนื้อหาหลักแอดมิน */
    #mainAdminContent {
      width: 100%; display: none; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box;
    }

    .admin-box { background: white; padding: 25px; border-radius: 10px; width: 100%; max-width: 800px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 25px; box-sizing: border-box; }
    h2 { margin-top: 0; display: flex; justify-content: space-between; align-items: center; color: #333; }
    label { font-weight: bold; margin-top: 15px; display: block; font-size: 14px; color: #333; }
    input, select, textarea, button { width: 100%; padding: 12px; margin-top: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; font-size: 14px; }
    textarea { height: 120px; resize: vertical; }
    button { color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.2s; }
    button:hover { opacity: 0.85; }
    
    .btn-blue { background: #007bff; }
    .btn-green { background: #28a745; }
    .btn-yellow { background: #ffc107; color: #000; }
    .btn-red { background: #dc3545; }
    .btn-gray { background: #6c757d; display: none; }
    
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 15px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: middle; }
    th { background-color: #f8f9fa; text-align: center; }
    .action-btns { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
    .action-btns button { width: auto; padding: 6px 10px; margin: 0; font-size: 12px; }
  </style>
</head>
<body>

  <!-- ส่วนล็อกอินผู้ดูแลระบบ (Firebase Auth) -->
  <div id="adminLoginWrapper">
     <div class="login-card">
        <h2>ระบบจัดการสำหรับผู้ดูแล</h2>
        <p style="color:gray; margin-bottom: 20px;">กรุณาเข้าสู่ระบบด้วยบัญชีแอดมินที่ลงทะเบียนไว้</p>
        <input type="email" id="adminEmail" placeholder="อีเมลแอดมิน..." style="text-align:center;" required>
        <input type="password" id="adminPassword" placeholder="รหัสผ่าน..." style="text-align:center;" required>
        <button class="btn-blue" onclick="loginAdmin()">เข้าสู่ระบบ</button>
        <p id="loginError" style="color:red; display:none; margin-top:10px; font-weight:bold;">อีเมลหรือรหัสผ่านไม่ถูกต้อง</p>
     </div>
  </div>

  <!-- เนื้อหาหน้าแอดมินเดิม (จะแสดงเมื่อล็อกอินสำเร็จ) -->
  <div id="mainAdminContent">
    
    <div style="width: 100%; max-width: 800px; display: flex; justify-content: flex-end; margin-bottom: 15px;">
       <button class="btn-red" style="width: auto; padding: 8px 15px; margin: 0;" onclick="logoutAdmin()">ออกจากระบบผู้ดูแล</button>
    </div>

    <!-- กล่อง: ให้สิทธิ์ดาวน์โหลดโดยตรง -->
    <div class="admin-box" style="border: 2px solid #28a745;">
      <h2>การอนุมัติสิทธิ์การเข้าถึงทันที (โดยไม่ต้องรอยื่นคำขอ)</h2>
      <label>1. เลือกระบบงาน / เอกสาร:</label>
      <select id="directJobSelect">
        <option value="">-- กำลังโหลดข้อมูลระบบงาน... --</option>
      </select>
      
      <label>2. รหัสผู้รับสิทธิ์:</label>
      <input type="text" id="directStudentId" placeholder="ระบุรหัสประจำตัวผู้รับสิทธิ์..." required>
      
      <button class="btn-green" onclick="grantDirectDownload()">ยืนยันการให้สิทธิ์การดาวน์โหลด</button>
    </div>

    <div class="admin-box">
      <h2 id="formTitle">เพิ่มรายการเข้าสู่ระบบ</h2>
      <input type="hidden" id="editJobId"> <label>1. ชื่อรายการ / เอกสาร:</label>
      <input type="text" id="jobTitle" placeholder="ตัวอย่าง: เอกสารประกอบการเรียน" required>
      
      <label>2. ประเภทของไฟล์:</label>
      <select id="fileType">
        <option value="youtube">วิดีโอ (ลิงก์ YouTube)</option>
        <option value="image">รูปภาพ (ลิงก์ภาพ)</option>
        <option value="pdf">ไฟล์ PDF / Google Drive (ลิงก์เอกสาร)</option>
        <option value="link">ลิงก์เว็บไซต์ภายนอก (URL)</option>
      </select>

      <label>3. ข้อมูลลิงก์ (URL):</label>
      <input type="text" id="fileUrl" placeholder="ระบุลิงก์ข้อมูลที่นี่..." required>

      <label>4. กำหนดรายชื่อผู้มีสิทธิ์เข้าชมเบื้องต้น (คั่นด้วยลูกน้ำ หรือ ขึ้นบรรทัดใหม่):</label>
      <textarea id="allowedUsers" placeholder="ระบุรหัสประจำตัว เช่น: 6810210178, 6810210220"></textarea>

      <div style="display: flex; gap: 10px;">
        <button class="btn-blue" id="btnSave" onclick="saveJob()">บันทึกข้อมูลระบบงาน</button>
        <button class="btn-gray" id="btnCancel" onclick="cancelEdit()">ยกเลิกการแก้ไข</button>
      </div>
      <p id="status" style="text-align: center; font-weight: bold; margin-bottom: 0;"></p>
    </div>

    <div class="admin-box">
      <h2>การจัดการรายการระบบงาน</h2>
      <div id="jobsTable"></div>
    </div>

    <div class="admin-box">
      <h2>จัดการคำขอสิทธิ์การเข้าถึง/ดาวน์โหลด</h2>
      <div id="requestsTable"></div>
    </div>

    <div class="admin-box">
      <h2>ประวัติการดาวน์โหลด (ผู้ชม)</h2>
      <div id="historyTable"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, addDoc, getDoc, deleteDoc, collection, getDocs, serverTimestamp, updateDoc, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    // นำเข้า Firebase Authentication
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBLyMpowfyQK_1UnredPFmXdBdtQZKpY-c",
      authDomain: "datapdf-d14d0.firebaseapp.com",
      databaseURL: "https://datapdf-d14d0-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "datapdf-d14d0",
      storageBucket: "datapdf-d14d0.firebasestorage.app",
      messagingSenderId: "1034739093928",
      appId: "1:1034739093928:web:cd56cc0e208d7d00f24d9d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app); // เริ่มต้นใช้งานระบบล็อกอิน

    // ==========================================
    // ระบบล็อกอินผู้ดูแล (Firebase Authentication)
    // ==========================================

    window.loginAdmin = function() {
      const email = document.getElementById("adminEmail").value;
      const pwd = document.getElementById("adminPassword").value;
      const errorMsg = document.getElementById("loginError");

      if (!email || !pwd) {
        errorMsg.innerText = "กรุณากรอกอีเมลและรหัสผ่านให้ครบถ้วน";
        errorMsg.style.display = "block";
        return;
      }

      errorMsg.style.display = "none";
      document.querySelector("#adminLoginWrapper button").innerText = "กำลังเข้าสู่ระบบ...";

      signInWithEmailAndPassword(auth, email, pwd)
        .then((userCredential) => {
          document.querySelector("#adminLoginWrapper button").innerText = "เข้าสู่ระบบ";
        })
        .catch((error) => {
          document.querySelector("#adminLoginWrapper button").innerText = "เข้าสู่ระบบ";
          errorMsg.style.display = "block";
          errorMsg.innerText = "อีเมลหรือรหัสผ่านไม่ถูกต้อง กรุณาลองใหม่";
        });
    }

    window.logoutAdmin = function() {
      if (confirm("ต้องการออกจากระบบผู้ดูแลหรือไม่?")) {
        signOut(auth).catch((error) => {
          alert("เกิดข้อผิดพลาดในการออกจากระบบ");
        });
      }
    }

    // ติดตามสถานะการเข้าสู่ระบบ
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // หากเข้าสู่ระบบแล้ว ให้ซ่อนหน้าล็อกอินและแสดงข้อมูลหลังบ้าน
        document.getElementById("adminLoginWrapper").style.display = "none";
        document.getElementById("mainAdminContent").style.display = "flex";
        
        // โหลดข้อมูลต่างๆ หลังจากยืนยันตัวตนสำเร็จ
        loadJobs();
        loadRequests();
        loadHistory();
      } else {
        // หากยังไม่เข้าสู่ระบบ ให้แสดงหน้าล็อกอิน
        document.getElementById("adminLoginWrapper").style.display = "flex";
        document.getElementById("mainAdminContent").style.display = "none";
      }
    });

    // ให้กด Enter เพื่อล็อกอินได้
    document.getElementById("adminPassword").addEventListener("keypress", function(e) {
      if (e.key === "Enter") loginAdmin();
    });

    // ==========================================
    // ระบบจัดการฐานข้อมูลต่างๆ (ทำงานเมื่อเข้าระบบแล้ว)
    // ==========================================

    function cleanUrl(type, url) {
      if (type === "youtube" && url.includes("watch?v=")) return `https://www.youtube.com/embed/${url.split("v=")[1].split("&")[0]}`;
      if (type === "youtube" && url.includes("youtu.be/")) return `https://www.youtube.com/embed/${url.split("youtu.be/")[1].split("?")[0]}`;
      if (type === "pdf" && url.includes("drive.google.com") && url.includes("/view")) return url.split("/view")[0] + "/preview";
      return url; 
    }

    window.saveJob = async function() {
      const editId = document.getElementById("editJobId").value;
      const title = document.getElementById("jobTitle").value.trim();
      const type = document.getElementById("fileType").value;
      let url = document.getElementById("fileUrl").value.trim();
      const rawUsers = document.getElementById("allowedUsers").value;
      const statusText = document.getElementById("status");

      if (!title || !url) {
        statusText.innerText = "กรุณาระบุข้อมูลให้ครบถ้วน";
        statusText.style.color = "red";
        return;
      }

      // ดึงรายชื่อต้นฉบับมาเพื่อแสดงผล และสร้างชุดรายชื่อแบบไม่มีช่องว่างสำหรับการค้นหาให้ลื่นไหลขึ้น
      const userList = rawUsers.split(/[\n,]+/).map(id => id.trim()).filter(id => id !== "");
      const searchList = userList.map(id => id.replace(/[\s"']/g, '').toLowerCase());
      
      url = cleanUrl(type, url);

      statusText.innerText = "ระบบกำลังบันทึกข้อมูล...";
      statusText.style.color = "blue";

      try {
        const jobData = {
          title: title,
          type: type,
          url: url,
          allowedUsers: userList,
          searchableUsers: searchList, // ชุดข้อมูลที่ถูกกรองเว้นวรรค
          updatedAt: serverTimestamp()
        };

        if (editId) {
          await setDoc(doc(db, "jobs", editId), jobData, { merge: true });
          statusText.innerText = "ปรับปรุงข้อมูลสำเร็จ";
        } else {
          jobData.createdAt = serverTimestamp();
          await addDoc(collection(db, "jobs"), jobData);
          statusText.innerText = "สร้างข้อมูลระบบงานสำเร็จ";
        }
        
        statusText.style.color = "green";
        cancelEdit(); 
        loadJobs();   
      } catch (error) {
        statusText.innerText = "เกิดข้อผิดพลาดในการบันทึกข้อมูล";
        statusText.style.color = "red";
      }
    }

    window.loadJobs = async function() {
      const tableDiv = document.getElementById("jobsTable");
      tableDiv.innerHTML = "<p style='text-align:center;'>กำลังโหลดข้อมูล...</p>";

      try {
        const querySnapshot = await getDocs(collection(db, "jobs"));
        if (querySnapshot.empty) {
          tableDiv.innerHTML = "<p style='text-align:center; color:gray;'>ไม่พบข้อมูลรายการในระบบ</p>";
          document.getElementById("directJobSelect").innerHTML = '<option value="">-- ไม่พบข้อมูลรายการในระบบ --</option>';
          return;
        }

        let html = `<table>
                      <tr>
                        <th width="30%">ชื่อรายการ</th>
                        <th width="15%">ประเภท</th>
                        <th width="30%">สิทธิ์การเข้าชมเบื้องต้น</th>
                        <th width="25%">การจัดการ</th>
                      </tr>`;
        
        let jobOptionsHtml = '<option value="">-- กรุณาเลือกระบบงาน --</option>';

        querySnapshot.forEach((docSnap) => {
          const id = docSnap.id;
          const data = docSnap.data();
          const userCount = data.allowedUsers ? data.allowedUsers.length : 0;
          
          jobOptionsHtml += `<option value="${id}">${data.title}</option>`;

          const safeData = encodeURIComponent(JSON.stringify({id: id, ...data}));

          html += `<tr>
                    <td><b>${data.title}</b></td>
                    <td style="text-align:center;">${data.type}</td>
                    <td style="text-align:center; color:green; font-weight:bold;">${userCount} บัญชี</td>
                    <td>
                      <div class="action-btns">
                        <button class="btn-yellow" onclick="editJob('${safeData}')">แก้ไข</button>
                        <button class="btn-red" onclick="deleteJob('${id}')">ลบ</button>
                      </div>
                    </td>
                   </tr>`;
        });
        html += "</table>";
        tableDiv.innerHTML = html;
        document.getElementById("directJobSelect").innerHTML = jobOptionsHtml;
      } catch (error) {
        tableDiv.innerHTML = "<p style='color:red; text-align:center;'>การเรียกข้อมูลล้มเหลว</p>";
      }
    }

    window.editJob = function(encodedData) {
      const data = JSON.parse(decodeURIComponent(encodedData));
      
      document.getElementById("formTitle").innerText = "แก้ไขข้อมูลและสิทธิ์ระบบงาน";
      document.getElementById("editJobId").value = data.id;
      document.getElementById("jobTitle").value = data.title;
      document.getElementById("fileType").value = data.type;
      document.getElementById("fileUrl").value = data.url;
      document.getElementById("allowedUsers").value = (data.allowedUsers || []).join(",\n");

      document.getElementById("btnSave").innerText = "บันทึกการแก้ไข";
      document.getElementById("btnSave").classList.replace("btn-blue", "btn-yellow");
      document.getElementById("btnCancel").style.display = "block";
      document.getElementById("status").innerText = "";
      
      window.scrollTo(0, 0);
    }

    window.cancelEdit = function() {
      document.getElementById("formTitle").innerText = "เพิ่มรายการเข้าสู่ระบบ";
      document.getElementById("editJobId").value = "";
      document.getElementById("jobTitle").value = "";
      document.getElementById("fileUrl").value = "";
      document.getElementById("allowedUsers").value = "";
      
      document.getElementById("btnSave").innerText = "บันทึกข้อมูลระบบงาน";
      document.getElementById("btnSave").classList.replace("btn-yellow", "btn-blue");
      document.getElementById("btnCancel").style.display = "none";
    }

    window.deleteJob = async function(id) {
      if (!confirm("ยืนยันการลบรายการนี้? (บัญชีทั้งหมดจะถูกตัดสิทธิ์จากรายการนี้ทันที)")) return;
      try {
        await deleteDoc(doc(db, "jobs", id));
        loadJobs();
      } catch (e) { alert("การลบข้อมูลล้มเหลว"); }
    }

    window.loadRequests = async function() {
      const tableDiv = document.getElementById("requestsTable");
      tableDiv.innerHTML = "<p style='text-align:center;'>กำลังโหลดข้อมูลคำขอ...</p>";

      try {
        const querySnapshot = await getDocs(collection(db, "download_requests"));
        if (querySnapshot.empty) {
          tableDiv.innerHTML = "<p style='text-align:center; color:gray;'>ไม่พบข้อมูลคำขอในระบบ</p>";
          return;
        }

        let html = `<table>
                      <tr>
                        <th width="20%">รหัสผู้รับสิทธิ์</th>
                        <th width="30%">ชื่อรายการ</th>
                        <th width="25%">สถานะปัจจุบัน</th>
                        <th width="25%">การจัดการ</th>
                      </tr>`;
        
        querySnapshot.forEach((docSnap) => {
          const id = docSnap.id;
          const data = docSnap.data();
          
          let badge = "";
          if (data.status === "pending") {
            badge = `<span style="color:#856404; font-weight:bold;">รอการตรวจสอบ</span>`;
          } else if (data.status === "approved") {
            badge = `<span style="color:#28a745; font-weight:bold;">อนุมัติการเข้าถึง</span>`;
            if (data.expiresAt) {
              const exp = data.expiresAt.toDate();
              badge += `<br><small style="color:gray;">หมดเขต: ${exp.toLocaleString('th-TH')}</small>`;
            } else {
              badge += `<br><small style="color:gray;">ไม่มีวันหมดอายุ</small>`;
            }
          } else if (data.status === "rejected") {
            badge = `<span style="color:#dc3545; font-weight:bold;">ปฏิเสธการเข้าถึง</span>`;
          }

          html += `<tr>
                    <td style="text-align:center;"><b>${data.studentId}</b></td>
                    <td>${data.jobTitle || '-'}</td>
                    <td style="text-align:center;">${badge}</td>
                    <td>
                      <div class="action-btns">
                        ${data.status !== 'approved' 
                          ? `<button class="btn-green" onclick="updateRequestStatus('${id}', 'approved')">อนุมัติ</button>` 
                          : `<button class="btn-yellow" onclick="editExpirationTime('${id}')">กำหนดเวลา</button>`}
                        ${data.status !== 'rejected' 
                          ? `<button class="btn-blue" onclick="updateRequestStatus('${id}', 'rejected')">ปฏิเสธ</button>` 
                          : ''}
                        <button class="btn-red" onclick="deleteRequest('${id}')">ลบคำขอ</button>
                      </div>
                    </td>
                   </tr>`;
        });
        html += "</table>";
        tableDiv.innerHTML = html;
      } catch (error) {
        tableDiv.innerHTML = "<p style='color:red; text-align:center;'>การเรียกข้อมูลล้มเหลว</p>";
      }
    }

    window.deleteRequest = async function(reqId) {
      if (!confirm("ยืนยันการลบคำขอนี้ออกจากระบบ?")) return;
      try {
        await deleteDoc(doc(db, "download_requests", reqId));
        loadRequests();
      } catch (e) {
        alert("การลบข้อมูลล้มเหลว");
      }
    }

    window.updateRequestStatus = async function(reqId, newStatus) {
      try {
        let updateData = {
          status: newStatus,
          updatedAt: serverTimestamp()
        };

        if (newStatus === 'approved') {
          const hours = prompt("กำหนดเวลาการเข้าถึง (ระบุเป็นชั่วโมง)\\n(ตัวอย่าง: 24 = 1 วัน, 72 = 3 วัน, หรือ 0 = เข้าถึงได้ถาวร)", "72");
          
          if (hours === null) return; 
          
          const duration = parseInt(hours);
          if (isNaN(duration) || duration < 0) {
            alert("กรุณาระบุตัวเลขที่ถูกต้อง");
            return;
          }
          
          if (duration > 0) {
            const expireDate = new Date();
            expireDate.setHours(expireDate.getHours() + duration);
            updateData.expiresAt = expireDate;
          } else {
            updateData.expiresAt = null; 
          }
        }

        await updateDoc(doc(db, "download_requests", reqId), updateData);
        loadRequests();
      } catch (e) {
        alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล");
      }
    }

    window.editExpirationTime = async function(reqId) {
      const hours = prompt("กำหนดเวลาการเข้าถึงใหม่ (ระบุเป็นชั่วโมงนับจากปัจจุบัน)\\n(ตัวอย่าง: 24 = 1 วัน, 72 = 3 วัน, หรือ 0 = เข้าถึงได้ถาวร)", "72");
      
      if (hours === null) return; 
      
      const duration = parseInt(hours);
      if (isNaN(duration) || duration < 0) {
        alert("กรุณาระบุตัวเลขที่ถูกต้อง");
        return;
      }
      
      try {
        let updateData = { updatedAt: serverTimestamp() };
        if (duration > 0) {
          const expireDate = new Date();
          expireDate.setHours(expireDate.getHours() + duration);
          updateData.expiresAt = expireDate;
        } else {
          updateData.expiresAt = null;
        }

        await updateDoc(doc(db, "download_requests", reqId), updateData);
        alert("ปรับปรุงข้อมูลเวลาสำเร็จ");
        loadRequests();
      } catch (e) {
        alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล");
      }
    }

    window.grantDirectDownload = async function() {
      const select = document.getElementById("directJobSelect");
      const jobId = select.value;
      const jobTitle = select.options[select.selectedIndex]?.text;
      const studentId = document.getElementById("directStudentId").value.trim();

      if (!jobId || !studentId) {
        alert("กรุณาระบุข้อมูลรายการและรหัสผู้รับสิทธิ์ให้ครบถ้วน");
        return;
      }

      const hours = prompt("กำหนดเวลาการเข้าถึง (ระบุเป็นชั่วโมง)\\n(ตัวอย่าง: 24 = 1 วัน, 72 = 3 วัน, หรือ 0 = เข้าถึงได้ถาวร)", "72");
      if (hours === null) return;
      
      const duration = parseInt(hours);
      if (isNaN(duration) || duration < 0) {
        alert("กรุณาระบุตัวเลขที่ถูกต้อง");
        return;
      }

      try {
        let updateData = {
          jobId: jobId,
          jobTitle: jobTitle,
          studentId: studentId,
          status: "approved",
          updatedAt: serverTimestamp()
        };

        if (duration > 0) {
          const expireDate = new Date();
          expireDate.setHours(expireDate.getHours() + duration);
          updateData.expiresAt = expireDate;
        } else {
          updateData.expiresAt = null;
        }

        const reqId = `${jobId}_${studentId}`;
        await setDoc(doc(db, "download_requests", reqId), updateData);
        
        alert(`ดำเนินการอนุมัติสิทธิ์ให้บัญชี ${studentId} สำเร็จ`);
        document.getElementById("directStudentId").value = ""; 
        loadRequests();
      } catch (e) {
        alert("เกิดข้อผิดพลาดในการประมวลผล");
      }
    }

    window.loadHistory = async function() {
      const tableDiv = document.getElementById("historyTable");
      tableDiv.innerHTML = "<p style='text-align:center;'>กำลังโหลดข้อมูลประวัติ...</p>";

      try {
        const querySnapshot = await getDocs(collection(db, "download_history"));
        if (querySnapshot.empty) {
          tableDiv.innerHTML = "<p style='text-align:center; color:gray;'>ไม่พบข้อมูลประวัติการดาวน์โหลด</p>";
          return;
        }

        let histories = [];
        querySnapshot.forEach(doc => {
            histories.push({ id: doc.id, ...doc.data() });
        });

        histories.sort((a, b) => {
            const timeA = a.downloadedAt ? a.downloadedAt.toMillis() : 0;
            const timeB = b.downloadedAt ? b.downloadedAt.toMillis() : 0;
            return timeB - timeA;
        });

        let html = `<table>
                      <tr>
                        <th width="20%">รหัสบัญชี</th>
                        <th width="40%">ข้อมูลรายการที่เข้าถึง</th>
                        <th width="40%">วัน / เวลาทำการ</th>
                      </tr>`;
        
        histories.forEach(data => {
          let dateStr = "-";
          if (data.downloadedAt) {
            dateStr = data.downloadedAt.toDate().toLocaleString('th-TH');
          }
          html += `<tr>
                    <td style="text-align:center;"><b>${data.studentId || '-'}</b></td>
                    <td>${data.jobTitle || '-'}</td>
                    <td style="text-align:center;">${dateStr}</td>
                   </tr>`;
        });
        html += "</table>";
        tableDiv.innerHTML = html;
      } catch (error) {
        tableDiv.innerHTML = "<p style='color:red; text-align:center;'>การเรียกข้อมูลประวัติล้มเหลว</p>";
      }
    }
  </script>
